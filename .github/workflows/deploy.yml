name: Build & Deploy

on:
  push:
    branches: [main]

# One deploy at a time; cancel any in-flight run when a new commit lands.
concurrency:
  group: deploy
  cancel-in-progress: true

env:
  # GHCR requires lowercase; hardcode rather than relying on github.repository_owner
  # which preserves the original casing of "Pragadeesh122".
  API_IMAGE: ghcr.io/pragadeesh122/agenticrag-api
  FRONTEND_IMAGE: ghcr.io/pragadeesh122/agenticrag-frontend

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build Docker images and push to GHCR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push
    runs-on: agenticrag-runners
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:buildcache,mode=max

      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          # Image is built linux/arm64 only; trivy defaults to amd64 when pulling
          # from a remote registry, which fails with "no child with platform".
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.API_IMAGE }}:${{ steps.tag.outputs.value }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          format: table
          trivyignores: .trivyignore

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: NEXT_PUBLIC_API_URL=https://api.runaxai.com
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: linux/arm64
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          format: table
          trivyignores: .trivyignore

  # ---------------------------------------------------------------------------
  # 2. Deploy to K3s via Helm
  #    Secrets live in a K8s Secret on the Mac mini (never stored in GitHub).
  #    Runner pod has in-cluster RBAC — see helm/github-runners/rbac.yaml.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: agenticrag-runners
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        run: |
          if ! command -v helm &>/dev/null; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

      - name: Install kubectl
        run: |
          if ! command -v kubectl &>/dev/null; then
            KUBECTL_VERSION=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
            curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl
          fi

      # Pull the Helm secrets file out of K8s — it was loaded once from the Mac mini
      # with: kubectl create secret generic helm-values-secrets \
      #         --from-file=values-secrets.yaml=helm/values-secrets.yaml -n arc-runners
      - name: Extract helm secrets
        run: |
          kubectl get secret helm-values-secrets -n arc-runners \
            -o jsonpath='{.data.values-secrets\.yaml}' | base64 -d > /tmp/values-secrets.yaml

      - name: Sync GHCR pull secret
        run: |
          kubectl create namespace agenticrag --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace agenticrag \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade
        run: |
          helm upgrade --install agenticrag ./helm/agenticrag \
            --namespace agenticrag \
            --create-namespace \
            -f helm/agenticrag/values.yaml \
            -f helm/agenticrag/values.prod.yaml \
            -f /tmp/values-secrets.yaml \
            --set "api.image.repository=${{ env.API_IMAGE }}" \
            --set "api.image.tag=${{ needs.build-push.outputs.tag }}" \
            --set "api.image.pullPolicy=Always" \
            --set "frontend.image.repository=${{ env.FRONTEND_IMAGE }}" \
            --set "frontend.image.tag=${{ needs.build-push.outputs.tag }}" \
            --set "frontend.image.pullPolicy=Always" \
            --set "global.imagePullSecrets[0].name=ghcr-pull-secret" \
            --atomic \
            --timeout 10m

      # Catches ingress / cert / DNS regressions that pass pod readiness.
      # Retries because cert-manager and ingress can lag a few seconds behind
      # the Helm release going Ready.
      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 https://api.runaxai.com/health; then
              echo "smoke test passed"
              exit 0
            fi
            echo "attempt $i failed, retrying in 6s..."
            sleep 6
          done
          echo "smoke test failed after 5 attempts"
          exit 1

  # ---------------------------------------------------------------------------
  # 3. Notify on failure (runs on GitHub-hosted runner so it still fires
  #    even if the Mac mini is offline / runners are down).
  # ---------------------------------------------------------------------------
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.substring(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed: ${sha}`,
              body: [
                `**Commit:** ${context.sha}`,
                `**Run:** ${run}`,
                `**Branch:** ${context.ref}`,
                ``,
                `Triggered by @${context.actor}.`
              ].join('\n'),
              labels: ['deploy-failure']
            });
