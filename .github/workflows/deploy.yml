name: Build & Deploy

on:
  push:
    branches: [main]

# One deploy at a time; cancel any in-flight run when a new commit lands.
concurrency:
  group: deploy
  cancel-in-progress: true

env:
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/agenticrag-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/agenticrag-frontend

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build Docker images and push to GHCR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push
    runs-on: agenticrag-runners
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.API_IMAGE }}:buildcache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.value }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: NEXT_PUBLIC_API_URL=https://api.runaxai.com
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  # ---------------------------------------------------------------------------
  # 2. Deploy to K3s via Helm
  #    Secrets live in a K8s Secret on the Mac mini (never stored in GitHub).
  #    Runner pod has in-cluster RBAC — see helm/github-runners/rbac.yaml.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: agenticrag-runners
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        run: |
          if ! command -v helm &>/dev/null; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi

      - name: Install kubectl
        run: |
          if ! command -v kubectl &>/dev/null; then
            KUBECTL_VERSION=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
            curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl
          fi

      # Pull the Helm secrets file out of K8s — it was loaded once from the Mac mini
      # with: kubectl create secret generic helm-values-secrets \
      #         --from-file=values-secrets.yaml=helm/values-secrets.yaml -n arc-runners
      - name: Extract helm secrets
        run: |
          kubectl get secret helm-values-secrets -n arc-runners \
            -o jsonpath='{.data.values-secrets\.yaml}' | base64 -d > /tmp/values-secrets.yaml

      - name: Sync GHCR pull secret
        run: |
          kubectl create namespace agenticrag --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace agenticrag \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade
        run: |
          helm upgrade --install agenticrag ./helm/agenticrag \
            --namespace agenticrag \
            --create-namespace \
            -f helm/agenticrag/values.yaml \
            -f helm/agenticrag/values.prod.yaml \
            -f /tmp/values-secrets.yaml \
            --set "api.image.repository=${{ env.API_IMAGE }}" \
            --set "api.image.tag=${{ needs.build-push.outputs.tag }}" \
            --set "api.image.pullPolicy=Always" \
            --set "frontend.image.repository=${{ env.FRONTEND_IMAGE }}" \
            --set "frontend.image.tag=${{ needs.build-push.outputs.tag }}" \
            --set "frontend.image.pullPolicy=Always" \
            --set "global.imagePullSecrets[0].name=ghcr-pull-secret" \
            --atomic \
            --timeout 10m
