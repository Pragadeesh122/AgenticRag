{{- if .Values.certManager.cloudflare.apiToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agenticrag.fullname" . }}-cloudflare-token
  namespace: cert-manager
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-token: {{ .Values.certManager.cloudflare.apiToken | quote }}
{{- end }}
