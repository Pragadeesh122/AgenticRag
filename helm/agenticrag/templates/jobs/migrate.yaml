apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "agenticrag.fullname" . }}-migrate
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "agenticrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ include "agenticrag.dbHost" . }}:{{ include "agenticrag.dbPort" . }}..."
              until nc -z {{ include "agenticrag.dbHost" . }} {{ include "agenticrag.dbPort" . }}; do
                sleep 2
              done
              echo "PostgreSQL is ready."
      containers:
        - name: migrate
          image: {{ include "agenticrag.apiImage" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: {{ include "agenticrag.configMapName" . }}
            - secretRef:
                name: {{ include "agenticrag.secretName" . }}
