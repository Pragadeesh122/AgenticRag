{{- if .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "agenticrag.fullname" . }}-api
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "agenticrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
