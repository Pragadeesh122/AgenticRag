{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticrag.fullname" . }}-postgres-init
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  01-init.sql: |
    -- E-commerce store schema with seed data
    CREATE TABLE IF NOT EXISTS customers (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        email VARCHAR(150) UNIQUE NOT NULL,
        city VARCHAR(100),
        country VARCHAR(50) DEFAULT 'US',
        created_at TIMESTAMP DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS categories (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        description TEXT
    );
    CREATE TABLE IF NOT EXISTS products (
        id SERIAL PRIMARY KEY,
        name VARCHAR(150) NOT NULL,
        category_id INT REFERENCES categories(id),
        price NUMERIC(10, 2) NOT NULL,
        stock INT DEFAULT 0,
        created_at TIMESTAMP DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS orders (
        id SERIAL PRIMARY KEY,
        customer_id INT REFERENCES customers(id),
        status VARCHAR(20) DEFAULT 'pending' CHECK (status IN ('pending', 'shipped', 'delivered', 'cancelled')),
        total NUMERIC(10, 2),
        created_at TIMESTAMP DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS order_items (
        id SERIAL PRIMARY KEY,
        order_id INT REFERENCES orders(id) ON DELETE CASCADE,
        product_id INT REFERENCES products(id),
        quantity INT NOT NULL DEFAULT 1,
        unit_price NUMERIC(10, 2) NOT NULL
    );
    CREATE TABLE IF NOT EXISTS reviews (
        id SERIAL PRIMARY KEY,
        product_id INT REFERENCES products(id),
        customer_id INT REFERENCES customers(id),
        rating INT CHECK (rating BETWEEN 1 AND 5),
        comment TEXT,
        created_at TIMESTAMP DEFAULT NOW()
    );
    INSERT INTO categories (name, description) VALUES
        ('Electronics', 'Phones, laptops, gadgets'),
        ('Clothing', 'Apparel and accessories'),
        ('Home & Kitchen', 'Furniture, appliances, decor'),
        ('Books', 'Fiction, non-fiction, textbooks')
    ON CONFLICT DO NOTHING;
  02-setup-reader.sh: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        DO \$\$
        BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'llm_reader') THEN
                CREATE USER llm_reader WITH PASSWORD '${DB_PASSWORD}';
            END IF;
        END
        \$\$;
        GRANT CONNECT ON DATABASE ${POSTGRES_DB} TO llm_reader;
        GRANT USAGE ON SCHEMA public TO llm_reader;
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO llm_reader;
        ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO llm_reader;
    EOSQL
{{- end }}
