apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenticrag.fullname" . }}-frontend
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.global.serviceType | default "ClusterIP" }}
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agenticrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
