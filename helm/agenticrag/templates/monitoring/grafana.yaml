{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana-provisioning
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "agenticrag.fullname" . }}-prometheus:9090
        isDefault: true
        editable: true
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://{{ include "agenticrag.fullname" . }}-loki:3100
        jsonData:
          maxLines: 2000
        editable: true
      {{- if .Values.monitoring.tempo.enabled }}
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://{{ include "agenticrag.fullname" . }}-tempo:3200
        editable: true
      {{- end }}
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: AgenticRAG
        orgId: 1
        folder: AgenticRAG
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "agenticrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "agenticrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.monitoring.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPassword | quote }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards
              mountPath: /etc/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: provisioning
          configMap:
            name: {{ include "agenticrag.fullname" . }}-grafana-provisioning
        - name: dashboards
          configMap:
            name: {{ include "agenticrag.fullname" . }}-grafana-dashboards
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenticrag.fullname" . }}-grafana
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.global.serviceType | default "ClusterIP" }}
  selector:
    {{- include "agenticrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
  ports:
    - name: http
      port: 3001
      targetPort: 3000
{{- end }}
