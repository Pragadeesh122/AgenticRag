{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "agenticrag.fullname" . }}-promtail
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "agenticrag.fullname" . }}-promtail
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "agenticrag.fullname" . }}-promtail
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "agenticrag.fullname" . }}-promtail
subjects:
  - kind: ServiceAccount
    name: {{ include "agenticrag.fullname" . }}-promtail
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agenticrag.fullname" . }}-promtail-config
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://{{ include "agenticrag.fullname" . }}-loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: agenticrag-pods
        static_configs:
          - targets: [localhost]
            labels:
              job: agenticrag
              __path__: /var/log/pods/{{ .Release.Namespace }}_*/*/*.log
        pipeline_stages:
          - docker: {}
          - regex:
              expression: '/var/log/pods/[^_]+_(?P<pod>[^_]+(?:_[^_]+)*?)_[^/]+/(?P<container>[^/]+)/.*'
              source: filename
          - labels:
              pod:
              container:
          - template:
              source: service_name
              template: '{{ `{{ .container }}` }}'
          - labels:
              service_name:
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "agenticrag.fullname" . }}-promtail
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
spec:
  selector:
    matchLabels:
      {{- include "agenticrag.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: promtail
  template:
    metadata:
      labels:
        {{- include "agenticrag.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: promtail
      annotations:
        rollme: {{ .Release.Revision | quote }}
    spec:
      serviceAccountName: {{ include "agenticrag.fullname" . }}-promtail
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: promtail
          image: {{ .Values.monitoring.promtail.image }}
          args:
            - "-config.file=/etc/promtail/config.yml"
          ports:
            - name: http
              containerPort: 9080
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: {{ include "agenticrag.fullname" . }}-promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
{{- end }}
