{{- if .Values.minio.enabled }}
# Headless service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenticrag.fullname" . }}-minio-headless
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 9000
      targetPort: api
      protocol: TCP
      name: api
  selector:
    {{- include "agenticrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
---
# Service for app connectivity (LoadBalancer exposes MinIO for browser presigned URLs)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agenticrag.fullname" . }}-minio
  labels:
    {{- include "agenticrag.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  type: {{ .Values.global.serviceType | default "ClusterIP" }}
  ports:
    - port: 9000
      targetPort: api
      protocol: TCP
      name: api
    - port: 9001
      targetPort: console
      protocol: TCP
      name: console
  selector:
    {{- include "agenticrag.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: minio
{{- end }}
